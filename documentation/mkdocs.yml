extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LiliaFramework/Lilia
    - icon: fontawesome/brands/discord
      link: https://discord.gg/esCRH5ckbQ

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - abbr
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
