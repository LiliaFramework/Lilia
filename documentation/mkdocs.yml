site_name: Lilia Framework
site_description: Premium documentation for running, shaping, and extending Lilia Garry's Mod roleplay servers.
site_author: Lilia Framework Team
site_url: https://liliaframework.github.io/
repo_url: https://github.com/LiliaFramework/Lilia
repo_name: LiliaFramework/Lilia

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  language: en
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.prune
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: slate
      primary: teal
      accent: cyan

