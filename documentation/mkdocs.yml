site_name: Lilia Framework
site_description: Premium documentation for running, shaping, and extending Lilia Garry's Mod roleplay servers.
site_author: Lilia Framework Team
site_url: https://liliaframework.github.io/
repo_url: https://github.com/LiliaFramework/Lilia
repo_name: LiliaFramework/Lilia

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  language: en
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.prune
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  palette:
    - scheme: slate
      primary: teal
      accent: cyan

nav:
  - Home: index.md
  - Developer:
      - Overview: developer/index.md
      - Meta Tables:
          - Overview: developer/meta/index.md
          # AUTO-GENERATED: META TABLES START
          - Character: developer/meta/character.md
          - Entity: developer/meta/entity.md
          - Inventory: developer/meta/inventory.md
          - Item: developer/meta/item.md
          - Panel: developer/meta/panel.md
          - Player: developer/meta/player.md
          # AUTO-GENERATED: META TABLES END
      - Libraries:
          - Overview: developer/libraries/index.md
          # AUTO-GENERATED: LIBRARIES START
          - Currency: developer/libraries/lia.currency.md
          # AUTO-GENERATED: LIBRARIES END
      - Hooks: developer/hooks/index.md
      - Compatibility: developer/compatibility/index.md
  - Reference:
      - Overview: definitions/index.md
      - Core:
          - Attributes: definitions/attributes.md
          - Factions: definitions/faction.md
          - Classes: definitions/class.md
          - Modules: definitions/module.md
      - Items:
          # AUTO-GENERATED: ITEM DEFINITIONS START
          - Overview: definitions/items/index.md
          - Item Base Field Reference: definitions/items/base-field-reference.md
          - Aid Item Definition: definitions/items/aid.md
          - Ammo Item Definition: definitions/items/ammo.md
          - ArcCW Attachment Item Definition: definitions/items/arccw_att.md
          - Books Item Definition: definitions/items/books.md
          - Entity Item Definition: definitions/items/entities.md
          - Grenade Item Definition: definitions/items/grenade.md
          - Outfit Item Definition: definitions/items/outfit.md
          - PAC Outfit Item Definition: definitions/items/pacoutfit.md
          - Stackable Item Definition: definitions/items/stackable.md
          - URL Item Definition: definitions/items/url.md
          - Weapons Item Definition: definitions/items/weapons.md
          # AUTO-GENERATED: ITEM DEFINITIONS END
  - Generators:
      - Overview: generators/index.md
      - Schema Generators:
          - Attributes: generators/attribute.md
          - Dialog NPC Generator: generators/dialog.md
          - Classes: generators/class.md
          - Factions: generators/faction.md
      - Item Generators:
          - Aid Items: generators/items/aid.md
          - Ammo Items: generators/items/ammo.md
          - Bags: generators/items/bags.md
          - Books and Notes: generators/items/books.md
          - Entity Items: generators/items/entities.md
          - Grenades: generators/items/grenade.md
          - Outfits: generators/items/outfit.md
          - PAC3 Outfits: generators/items/pacoutfit.md
          - Stackable Items: generators/items/stackable.md
          - URL Items: generators/items/url.md
          - Weapons: generators/items/weapons.md
  - Guides:
      - Framework Overview: about/index.md
      - Modules: modules/index.md
      - Installation: about/installation.md
      - Feature Map: about/features.md
      - Addon Compatibility: about/compatibility.md

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LiliaFramework/Lilia
    - icon: fontawesome/brands/discord
      link: https://discord.gg/esCRH5ckbQ

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - abbr
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
