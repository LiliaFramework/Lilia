name: ci
on:
  push:
    branches:
      - master
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone modules repository
        run: git clone --depth 1 https://github.com/LiliaFramework/Modules.git .cache/modules-repo
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material mkdocs-awesome-pages-plugin
      - name: Sync module versioning data
        run: python scripts/sync_versioning.py .cache/modules-repo
      - name: Build modules page
        run: python scripts/sync_modules_page.py
      - run: mkdocs build
      - run: mkdocs gh-deploy --force
